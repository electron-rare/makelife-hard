name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate file structure
        run: |
          test -f README.md
          test -f library/makelife.kicad_sym
          test -f sym-lib-table
          test -d blocks/power
          test -d blocks/mcu
          test -d blocks/sensing
          test -d blocks/protection
          test -d blocks/audio
          test -d blocks/led
          test -d blocks/motor
          test -d blocks/connectors

      - name: Run ERC/DRC validation
        run: python tools/validate_drc.py
